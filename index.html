<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAETO SISTEMA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="login-screen" class="container">
        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/6073/6073873.png" width="80" alt="Logo">
            <h2>GAETO SISTEMA</h2>
            <input type="text" id="login-nombre" placeholder="Usuario">
            <input type="password" id="login-clave" placeholder="Contraseña">
            <button onclick="ingresarAlSistema()">ENTRAR</button>
        </div>
    </div>

    <div id="app-container" class="container" style="display:none;">
        <nav class="sidebar">
            <h3>GAETO</h3>
            <button onclick="mostrarSeccion('dashboard')">📊 Dashboard</button>
            <button onclick="mostrarSeccion('registro')">💰 Nueva Venta</button>
            <button onclick="mostrarSeccion('vendedores')">👤 Vendedores</button>
            <button onclick="cerrarSesion()" class="btn-rojo">Salir</button>
        </nav>

        <main class="content">
            <section id="sec-dashboard">
                <h1>Resumen General</h1>
                <div class="stats">
                    <div class="stat-card">
                        <p>Total de Ventas</p>
                        <h2 id="total-general">$0</h2>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="graficaVentas"></canvas>
                </div>
            </section>

            <section id="sec-registro" style="display:none;">
                <h1>Registrar Venta</h1>
                <input type="number" id="v-monto" placeholder="Monto $">
                <select id="v-plaza">
                    <option value="Veracruz">Veracruz</option>
                    <option value="Medellin">Medellín</option>
                    <option value="Xalapa">Xalapa</option>
                </select>
                <input type="text" id="v-concepto" placeholder="Concepto (Concreto/Persianas)">
                <button onclick="guardarVenta()">GUARDAR VENTA</button>
            </section>

            <section id="sec-vendedores" style="display:none;">
                <h1>Gestión de Vendedores</h1>
                <div class="card">
                    <h3>Alta de Nuevo Vendedor</h3>
                    <input type="text" id="new-nombre" placeholder="Nombre completo">
                    <input type="password" id="new-clave" placeholder="Clave de acceso">
                    <button id="btn-registrar">REGISTRAR EN LA NUBE</button>
                </div>
                <hr>
                <h3>Vendedores Activos</h3>
                <div id="lista-vendedores"></div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
