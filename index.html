<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAETO SISTEMA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="card">
            <h1 style="color:#1a73e8; margin:0;">GAETO</h1>
            <p>Control de Ventas y Plazas</p>
            <input type="text" id="login-nombre" placeholder="Jose Tolentino">
            <input type="password" id="login-clave" placeholder="GT123">
            <button onclick="ingresarAlSistema()" class="btn-azul">ENTRAR AL SISTEMA</button>
        </div>
    </div>

    <div id="app-container" style="display:none;">
        <nav class="sidebar">
            <h2>GAETO</h2>
            <button onclick="mostrarSeccion('dashboard')">📊 INDICADORES</button>
            <button onclick="mostrarSeccion('registro')">💰 NUEVA VENTA</button>
            <button onclick="mostrarSeccion('vendedores')">👥 VENDEDORES</button>
        </nav>

        <main class="content">
            <section id="sec-dashboard">
                <h1>Dashboard de Ventas</h1>
                <div class="stats-grid">
                    <div class="stat-card"><h4>TOTAL ACUMULADO</h4><p id="total-general">$0.00</p></div>
                    <div class="stat-card"><h4>PLAZA LÍDER</h4><p id="mejor-plaza">Veracruz</p></div>
                </div>
                <div class="chart-container">
                    <canvas id="graficaVentas"></canvas>
                </div>
            </section>

            <section id="sec-registro" style="display:none;">
                <h1>Registro de Operación</h1>
                <div class="card">
                    <input type="number" id="v-monto" placeholder="Monto ($)">
                    <select id="v-plaza">
                        <option value="Veracruz">Veracruz</option>
                        <option value="Medellín">Medellín</option>
                        <option value="Xalapa">Xalapa</option>
                        <option value="Boca del Río">Boca del Río</option>
                    </select>
                    <input type="text" id="v-concepto" placeholder="Concepto (Concreto / Persianas)">
                    <button onclick="guardarVenta()" class="btn-verde">SUBIR A LA NUBE</button>
                </div>
            </section>

            <section id="sec-vendedores" style="display:none;">
                <h1>Gestión de Equipo</h1>
                <div class="card">
                    <input type="text" id="new-nombre" placeholder="Nombre del Vendedor">
                    <input type="text" id="new-clave" placeholder="Clave">
                    <button id="btn-registrar" class="btn-azul">REGISTRAR VENDEDOR</button>
                </div>
                <div id="lista-vendedores" class="lista"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
