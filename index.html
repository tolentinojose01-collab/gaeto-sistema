<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAETO SISTEMA</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="card-login">
            <h1 style="color:#1a73e8; margin-bottom: 5px;">GAETO</h1>
            <p style="margin-top: 0; color: #666;">Sistema de Control</p>
            <input type="text" id="login-nombre" placeholder="Usuario">
            <input type="password" id="login-clave" placeholder="Contraseña">
            <button onclick="ingresarAlSistema()" class="btn-azul">ENTRAR</button>
        </div>
    </div>

    <div id="app-container" style="display:none;">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h3>GAETO</h3>
            </div>
            <button onclick="mostrarSeccion('dashboard')">📊 DASHBOARD</button>
            <button onclick="mostrarSeccion('registro')">💰 NUEVA VENTA</button>
            <button onclick="mostrarSeccion('vendedores')">👤 VENDEDORES</button>
            <hr style="width: 80%; border: 0.5px solid #444;">
            <button onclick="cerrarSesion()" class="btn-salir">🚪 SALIR</button>
        </nav>

        <main class="content">
            <section id="sec-dashboard">
                <h2 class="titulo-seccion">Indicadores de Venta</h2>
                <div class="stats-grid">
                    <div class="stat-card"><h4>VENTA TOTAL</h4><p id="total-general">$0.00</p></div>
                    <div class="stat-card"><h4>PLAZAS</h4><p id="num-plazas">0</p></div>
                </div>
                <div class="chart-container">
                    <canvas id="graficaVentas"></canvas>
                </div>
            </section>

            <section id="sec-registro" style="display:none;">
                <h2 class="titulo-seccion">Registrar Operación</h2>
                <div class="card-form">
                    <label>Monto de Venta ($)</label>
                    <input type="number" id="v-monto" placeholder="Ej: 15000">
                    <label>Plaza / Ubicación</label>
                    <select id="v-plaza">
                        <option value="Veracruz">Veracruz</option>
                        <option value="Medellín">Medellín</option>
                        <option value="Xalapa">Xalapa</option>
                        <option value="Boca del Río">Boca del Río</option>
                    </select>
                    <label>Concepto (Concreto / Persiana)</label>
                    <input type="text" id="v-concepto" placeholder="Ej: Venta Concreto">
                    <button onclick="guardarVenta()" class="btn-verde">ENVIAR A LA NUBE</button>
                </div>
            </section>

            <section id="sec-vendedores" style="display:none;">
                <h2 class="titulo-seccion">Alta de Personal</h2>
                <div class="card-form">
                    <input type="text" id="new-nombre" placeholder="Nombre completo">
                    <input type="text" id="new-clave" placeholder="Asignar Clave">
                    <button id="btn-registrar" class="btn-azul">GUARDAR VENDEDOR</button>
                </div>
                <h3 style="margin-top:30px;">Vendedores Registrados:</h3>
                <div id="lista-vendedores" class="lista-v"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
